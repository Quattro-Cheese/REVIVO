services:
  - type: web
    name: cpr-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TRANSFORMERS_CACHE
        value: /tmp/transformers_cache
      - key: HF_HOME
        value: /tmp/hf_home
        key: USE_RAG
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: cpr-db
          property: connectionString

databases:
  - name: cpr-db
    plan: free
